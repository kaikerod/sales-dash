services:
  - type: web
    name: sales-dash-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: back-end
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sales-dash-db
          property: connectionString

databases:
  - name: sales-dash-db
    plan: free